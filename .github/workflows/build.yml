name: Build & Push Docker Image

on:
  push:
    branches: [main, testing]
    tags: ["v*"]
  pull_request:
    branches: [testing, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BidParser.sln

      - name: Build
        run: dotnet build BidParser.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BidParser.sln --configuration Release --no-build --verbosity normal

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/testing' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    permissions:
      contents: read
      packages: write
    env:
      # The docker/* actions (build-push-action@v6, login-action@v3,
      # metadata-action@v5, setup-buildx-action@v3) still ship with the
      # Node 20 runtime as of 2026-05. Node 20 is being deprecated on
      # GitHub-hosted runners (forced to Node 24 on 2026-06-02, removed
      # on 2026-09-16). Force them onto Node 24 now so the workflow
      # doesn't trip the deprecation warning. Remove this flag once the
      # docker org ships majors that run natively on Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=testing,enable=${{ github.ref == 'refs/heads/testing' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/testing' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Resolve app version
        id: app_version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9] ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-windows:
    runs-on: windows-latest
    needs: [test]
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/testing' ||
        startsWith(github.ref, 'refs/tags/v')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9] ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "label=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
            echo "label=testing" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish single-file exe
        run: >
          dotnet publish src/BidParser.Wpf -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:Version=${{ steps.ver.outputs.value }}
          -o publish

      - name: Rename to versioned asset
        shell: bash
        run: mv publish/BidParserLite.exe "BidParserLite-${{ steps.ver.outputs.label }}-win-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: BidParserLite-*-win-x64.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-and-push, publish-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download exe artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BidParserLite-*-win-x64.exe
          generate_release_notes: true
          body: |
            **Docker image (web app):**
            ```
            docker pull ghcr.io/regalen/bidparser:${{ github.ref_name }}
            ```
